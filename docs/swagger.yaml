      - 兑换码
    get:
      consumes:
      - application/json
      description: 获取兑换码详情，需要管理员权限
      parameters:
      - description: 兑换码 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            $ref: '#/definitions/model.Redemption'
      security:
      - UserAuth: []
      summary: 获取指定兑换码
