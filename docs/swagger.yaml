      parameters:
      - description: 搜索关键词
        in: query
        name: keyword
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            additionalProperties: true
            type: object
      security:
      - UserAuth: []
      summary: 搜索兑换码
      tags:
      - 兑换码
  /api/reset_password:
    get:
      consumes:
      - application/json
