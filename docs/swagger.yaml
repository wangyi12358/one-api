      consumes:
      - application/json
      description: 删除指定兑换码，需要管理员权限
      parameters:
      - description: 兑换码 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            additionalProperties: true
            type: object
      security:
      - UserAuth: []
      summary: 删除兑换码
