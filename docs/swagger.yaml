      parameters:
      - description: 邮箱地址
        in: query
        name: email
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            additionalProperties: true
            type: object
      summary: 发送密码重置邮件
      tags:
      - 用户认证
  /api/status:
    get:
      consumes:
      - application/json
      description: 获取系统状态信息，包括版本、功能开关等
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            additionalProperties: true
            type: object
      summary: 获取系统状态
      tags:
      - 系统
  /api/token/:
    get:
      consumes:
      - application/json
      description: 获取当前用户的所有令牌
      parameters:
      - default: 0
        description: 页码
        in: query
        name: p
        type: integer
      - description: 排序方式
        enum:
        - remain_quota
        - used_quota
        in: query
        name: order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            additionalProperties: true
            type: object
      security:
      - UserAuth: []
