  /api/oauth/email/bind:
    get:
      consumes:
      - application/json
      description: 绑定用户邮箱
      parameters:
      - description: 邮箱地址
        in: query
        name: email
        required: true
        type: string
      - description: 验证码
        in: query
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            additionalProperties: true
            type: object
      security:
      - UserAuth: []
      summary: 绑定邮箱
      tags:
      - OAuth
  /api/option/:
    get:
      consumes:
      - application/json
      description: 获取所有系统设置，需要 Root 权限
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            additionalProperties: true
            type: object
      security:
      - UserAuth: []
      summary: 获取系统设置
