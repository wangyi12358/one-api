      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            additionalProperties: true
            type: object
      security:
      - UserAuth: []
      summary: 创建兑换码
      tags:
      - 兑换码
  /api/redemption/{id}:
