basePath: /
definitions:
  controller.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    type: object
  controller.PasswordResetRequest:
    properties:
      email:
        type: string
      token:
        type: string
    type: object
  controller.adminTopUpRequest:
    properties:
      quota:
        type: integer
      remark:
        type: string
      user_id:
        type: integer
    type: object
  controller.topUpRequest:
    properties:
      key:
        type: string
    type: object
  model.Channel:
    properties:
      balance:
        description: in USD
        type: number
      balance_updated_time:
        type: integer
      base_url:
        type: string
      config:
        type: string
      created_time:
        type: integer
      group:
        type: string
      id:
        type: integer
      key:
        type: string
      model_mapping:
        type: string
      models:
        type: string
      name:
        type: string
      other:
        description: 'DEPRECATED: please save config to field Config'
        type: string
      priority:
        type: integer
      response_time:
        description: in milliseconds
        type: integer
      status:
        type: integer
      system_prompt:
        type: string
      test_time:
        type: integer
      type:
        type: integer
      used_quota:
        type: integer
      weight:
        type: integer
    type: object
  model.Option:
    properties:
      key:
        type: string
      value:
        type: string
    type: object
  model.Redemption:
    properties:
      count:
        description: only for api request
        type: integer
      created_time:
        type: integer
      id:
        type: integer
      key:
        type: string
      name:
        type: string
      quota:
        type: integer
      redeemed_time:
        type: integer
      status:
        type: integer
      user_id:
        type: integer
    type: object
  model.Token:
    properties:
      accessed_time:
        type: integer
      created_time:
        type: integer
      expired_time:
        description: -1 means never expired
        type: integer
      id:
        type: integer
      key:
        type: string
      models:
        description: allowed models
        type: string
      name:
        type: string
      remain_quota:
        type: integer
      status:
        type: integer
      subnet:
        description: allowed subnet
        type: string
      unlimited_quota:
        type: boolean
      used_quota:
        description: used quota
        type: integer
      user_id:
        type: integer
    type: object
  model.User:
    properties:
      access_token:
        description: this token is for system management
        type: string
      aff_code:
        type: string
      display_name:
        maxLength: 20
        type: string
      email:
        maxLength: 50
        type: string
      github_id:
        type: string
      group:
        type: string
      id:
        type: integer
      inviter_id:
        type: integer
      lark_id:
        type: string
      oidc_id:
        type: string
      password:
        maxLength: 20
        minLength: 8
        type: string
      quota:
        type: integer
      request_count:
        description: request number
        type: integer
      role:
        description: admin, util
        type: integer
      status:
        description: enabled, disabled
        type: integer
      used_quota:
        description: used quota
        type: integer
      username:
        maxLength: 12
        type: string
      verification_code:
        description: this field is only for Email verification, don't save it to database!
        type: string
      wechat_id:
        type: string
    type: object
  service.CreateChannelRequest:
    properties:
      balance:
        type: number
      base_url:
        type: string
      config:
        type: string
      group:
        type: string
      key:
        type: string
      model_mapping:
        type: string
      models:
        type: string
      name:
        type: string
      other:
        type: string
      priority:
        type: integer
      system_prompt:
        type: string
      type:
        type: integer
      weight:
        type: integer
    type: object
  service.CreateRedemptionRequest:
    properties:
      count:
        type: integer
      name:
        type: string
      quota:
        type: integer
    type: object
  service.CreateTokenRequest:
    properties:
      expired_time:
        type: integer
      models:
        type: string
      name:
        type: string
      remain_quota:
        type: integer
      subnet:
        type: string
      unlimited_quota:
        type: boolean
    type: object
  service.ManageAction:
    enum:
    - disable
    - enable
    - delete
    - promote
    - demote
    type: string
    x-enum-varnames:
    - ManageActionDisable
    - ManageActionEnable
    - ManageActionDelete
    - ManageActionPromote
    - ManageActionDemote
  service.ManageUserRequest:
    properties:
      action:
        $ref: '#/definitions/service.ManageAction'
      username:
        type: string
    type: object
  service.RegisterRequest:
    properties:
      aff_code:
        type: string
      display_name:
        type: string
      email:
        type: string
      password:
        type: string
      username:
        type: string
      verification_code:
        type: string
    type: object
  service.UpdateRedemptionRequest:
    properties:
      id:
        type: integer
      name:
        type: string
      quota:
        type: integer
      status:
        type: integer
    type: object
  service.UpdateTokenRequest:
    properties:
      expired_time:
        type: integer
      id:
        type: integer
      models:
        type: string
      name:
        type: string
      remain_quota:
        type: integer
      status:
        type: integer
      subnet:
        type: string
      unlimited_quota:
        type: boolean
    type: object
  service.UserUpdateParams:
    properties:
      display_name:
        type: string
      id:
        type: integer
      password:
        type: string
      quota:
        type: integer
      role:
        type: integer
      username:
        type: string
    type: object
host: localhost:3000
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: One API 后台管理接口文档
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: One API
  version: "1.0"
paths:
  /api/about:
    get:
      consumes:
      - application/json
      description: 获取关于页面内容
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            additionalProperties: true
            type: object
      summary: 获取关于页面
      tags:
      - 系统
  /api/channel/:
    get:
      consumes:
      - application/json
      description: 获取渠道列表，需要管理员权限
      parameters:
      - default: 0
        description: 页码
        in: query
        name: p
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            additionalProperties: true
            type: object
      security:
      - UserAuth: []
      summary: 获取所有渠道
      tags:
      - 渠道管理
    post:
      consumes:
      - application/json
      description: 创建新渠道，需要管理员权限
      parameters:
      - description: 创建请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/service.CreateChannelRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            additionalProperties: true
            type: object
      security:
      - UserAuth: []
      summary: 创建渠道
      tags:
      - 渠道管理
    put:
      consumes:
      - application/json
      description: 更新渠道信息，需要管理员权限
      parameters:
      - description: 更新请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.Channel'
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            $ref: '#/definitions/model.Channel'
      security:
      - UserAuth: []
      summary: 更新渠道
      tags:
      - 渠道管理
  /api/channel/{id}:
    delete:
      consumes:
      - application/json
      description: 删除指定渠道，需要管理员权限
      parameters:
      - description: 渠道 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            additionalProperties: true
            type: object
      security:
      - UserAuth: []
      summary: 删除渠道
      tags:
      - 渠道管理
    get:
      consumes:
      - application/json
      description: 获取渠道详情，需要管理员权限
      parameters:
      - description: 渠道 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            $ref: '#/definitions/model.Channel'
      security:
      - UserAuth: []
      summary: 获取指定渠道
      tags:
      - 渠道管理
  /api/channel/disabled:
    delete:
      consumes:
      - application/json
      description: 删除所有禁用的渠道，需要管理员权限
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            additionalProperties: true
            type: object
      security:
      - UserAuth: []
      summary: 删除禁用渠道
      tags:
      - 渠道管理
  /api/channel/search:
    get:
      consumes:
      - application/json
      description: 根据关键词搜索渠道，需要管理员权限
      parameters:
      - description: 搜索关键词
        in: query
        name: keyword
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            additionalProperties: true
            type: object
      security:
      - UserAuth: []
      summary: 搜索渠道
      tags:
      - 渠道管理
  /api/home_page_content:
    get:
      consumes:
      - application/json
      description: 获取首页展示内容
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            additionalProperties: true
            type: object
      summary: 获取首页内容
      tags:
      - 系统
  /api/log/:
    delete:
      consumes:
      - application/json
      description: 删除指定时间之前的日志，需要管理员权限
      parameters:
      - description: 目标时间戳
        in: query
        name: target_timestamp
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            additionalProperties: true
            type: object
      security:
      - UserAuth: []
      summary: 删除历史日志
      tags:
      - 日志
    get:
      consumes:
      - application/json
      description: 获取日志列表，需要管理员权限
      parameters:
      - default: 0
        description: 页码
        in: query
        name: p
        type: integer
      - description: 日志类型
        in: query
        name: type
        type: integer
      - description: 开始时间戳
        in: query
        name: start_timestamp
        type: integer
      - description: 结束时间戳
        in: query
        name: end_timestamp
        type: integer
      - description: 用户名
        in: query
        name: username
        type: string
      - description: 令牌名称
        in: query
        name: token_name
        type: string
      - description: 模型名称
        in: query
        name: model_name
        type: string
      - description: 渠道 ID
        in: query
        name: channel
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            additionalProperties: true
            type: object
      security:
      - UserAuth: []
      summary: 获取所有日志
      tags:
      - 日志
  /api/log/search:
    get:
      consumes:
      - application/json
      description: 根据关键词搜索日志，需要管理员权限
      parameters:
      - description: 搜索关键词
        in: query
        name: keyword
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            additionalProperties: true
            type: object
      security:
      - UserAuth: []
      summary: 搜索所有日志
      tags:
      - 日志
  /api/log/self:
    get:
      consumes:
      - application/json
      description: 获取当前用户的日志
      parameters:
      - default: 0
        description: 页码
        in: query
        name: p
        type: integer
      - description: 日志类型
        in: query
        name: type
        type: integer
      - description: 开始时间戳
        in: query
        name: start_timestamp
        type: integer
      - description: 结束时间戳
        in: query
        name: end_timestamp
        type: integer
      - description: 令牌名称
        in: query
        name: token_name
        type: string
      - description: 模型名称
        in: query
        name: model_name
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            additionalProperties: true
            type: object
      security:
      - UserAuth: []
      summary: 获取用户日志
      tags:
      - 日志
  /api/log/self/search:
    get:
      consumes:
      - application/json
      description: 根据关键词搜索当前用户的日志
      parameters:
      - description: 搜索关键词
        in: query
        name: keyword
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            additionalProperties: true
            type: object
      security:
      - UserAuth: []
      summary: 搜索用户日志
      tags:
      - 日志
  /api/log/self/stat:
    get:
      consumes:
      - application/json
      description: 获取当前用户的日志统计
      parameters:
      - description: 日志类型
        in: query
        name: type
        type: integer
      - description: 开始时间戳
        in: query
        name: start_timestamp
        type: integer
      - description: 结束时间戳
        in: query
        name: end_timestamp
        type: integer
      - description: 令牌名称
        in: query
        name: token_name
        type: string
      - description: 模型名称
        in: query
        name: model_name
        type: string
      - description: 渠道 ID
        in: query
        name: channel
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            additionalProperties: true
            type: object
      security:
      - UserAuth: []
      summary: 获取用户日志统计
      tags:
      - 日志
  /api/log/stat:
    get:
      consumes:
      - application/json
      description: 获取日志统计数据，需要管理员权限
      parameters:
      - description: 日志类型
        in: query
        name: type
        type: integer
      - description: 开始时间戳
        in: query
        name: start_timestamp
        type: integer
      - description: 结束时间戳
        in: query
        name: end_timestamp
        type: integer
      - description: 令牌名称
        in: query
        name: token_name
        type: string
      - description: 用户名
        in: query
        name: username
        type: string
      - description: 模型名称
        in: query
        name: model_name
        type: string
      - description: 渠道 ID
        in: query
        name: channel
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            additionalProperties: true
