      - 兑换码
    put:
      consumes:
      - application/json
      description: 更新兑换码信息，需要管理员权限
      parameters:
      - description: 兑换码 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 是否只更新状态
        in: query
        name: status_only
        type: boolean
      - description: 更新请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/service.UpdateRedemptionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            $ref: '#/definitions/model.Redemption'
      security:
      - UserAuth: []
      summary: 更新兑换码
